<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ZoneMind Editor</title>

  <link rel="stylesheet" href="./editor.css">
</head>

<body>

<header class="app-header">
  <div>
    <h1>ZoneMind Editor</h1>
    <p>Definizione rapida delle zone del negozio</p>
  </div>
</header>

<nav class="toolbar">

  <button id="loadImageButton" type="button">
    Apri planimetria
  </button>

  <button id="newZoneButton" type="button">
    Nuova zona
  </button>

  <button id="finishEditingButton" type="button" disabled>
    Fine editing
  </button>

  <button id="deleteZoneButton" type="button" disabled>
    Elimina zona
  </button>

  <button id="importJsonButton" type="button">
    Importa JSON
  </button>

  <button id="exportJsonButton" type="button">
    Esporta JSON
  </button>

  <input
    id="imageInput"
    type="file"
    accept="image/*"
    hidden
  >

  <input
    id="jsonInput"
    type="file"
    accept=".json,application/json"
    hidden
  >

</nav>

<main>

  <div id="statusBar" class="status-bar">
    Apri una planimetria per iniziare.
  </div>

  <section id="emptyState" class="empty-state">
    <h2>Nessuna planimetria caricata</h2>
    <p>
      Carica un'immagine oppure importa un layout JSON.
    </p>
  </section>

  <section id="editorArea" class="editor-area" hidden>

    <div id="mapContainer" class="map-container">

      <img
        id="floorplanImage"
        alt="Planimetria"
        draggable="false"
      >

      <svg
        id="zoneLayer"
        xmlns="http://www.w3.org/2000/svg"
      ></svg>

    </div>

  </section>

</main>

<footer class="app-footer">
  <span id="modeIndicator">Modalità: selezione</span>
  <span id="zoneCounter">Zone: 0</span>
</footer>

<script
  type="module"
  src="./editor.js"
></script>

</body>
</html>
